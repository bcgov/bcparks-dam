# This workflow will run terraform apply, which will deploy the infrastructure and the resourcespace instance

name: terraform apply

on:
  workflow_dispatch:
    inputs:
      env:
        description: select the environment to update
        type: environment
        required: true

env:
  TF_VERSION: 1.14.3
  TERRAGRUNT_VERSION: 0.55.16
  environment: ${{ inputs.env }}

permissions:
  id-token: write # This is required for requesting the JWT
  contents: read # This is required for actions/checkout

jobs:
  terraform:
    environment: ${{ inputs.env }}
    runs-on: ubuntu-latest
    steps:
      - name: checkout the repository
        uses: actions/checkout@v4

      - name: print cloud_environment
        run: echo "The cloud environment is ${{ env.environment }}"

      - name: setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: install Terragrunt
        run: |
          curl -sSL -o /usr/local/bin/terragrunt "https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64"
          chmod +x /usr/local/bin/terragrunt
          terragrunt --version

      - name: configuring AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.TERRAFORM_DEPLOY_ROLE_ARN }}
          aws-region: ca-central-1

      - name: deploying bcparks-dam using terragrunt
        run: |
          cd src/terraform/terragrunt/${{ env.environment }}
          terragrunt init -input=false
          terragrunt apply -auto-approve -input=false
        env:
          licenceplate: ${{ vars.LICENCE_PLATE }}
